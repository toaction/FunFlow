<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录注册弹窗原型</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 演示控制面板 */
        .demo-controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(22, 24, 35, 0.95);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2b2d38;
            z-index: 10000;
        }

        .demo-controls h3 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #fe2c55;
        }

        .demo-controls button {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .demo-controls button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .demo-controls .status-indicator {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #2b2d38;
            font-size: 13px;
            color: #8a8b8e;
        }

        .demo-controls .status-indicator.logged-in {
            color: #20d5a1;
        }

        /* 遮罩层 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            z-index: 9999;
            animation: fadeIn 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* 弹窗容器 */
        .modal-container {
            background: #161823;
            border-radius: 16px;
            width: 480px;
            max-width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease;
            position: relative;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* 关闭按钮 */
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #8a8b8e;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s;
            z-index: 10;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            transform: rotate(90deg);
        }

        /* 弹窗头部 */
        .modal-header {
            padding: 40px 40px 20px;
            text-align: center;
        }

        .modal-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #4A9EFF 0%, #A78BFA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-subtitle {
            font-size: 14px;
            color: #8a8b8e;
        }

        /* 弹窗内容 */
        .modal-body {
            padding: 20px 40px 40px;
        }

        /* 表单组 */
        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: #e4e6eb;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: #2b2d38;
            border: 1px solid #3a3a3a;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .form-input:focus {
            border-color: #667eea;
            background: #1e1f29;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-input::placeholder {
            color: #6b6c6f;
        }

        /* 验证码输入框 */
        .captcha-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .captcha-input {
            flex: 1;
        }

        .captcha-image {
            width: 120px;
            height: 48px;
            background: #2b2d38;
            border: 1px solid #3a3a3a;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #667eea;
            position: relative;
            overflow: hidden;
            user-select: none;
            transition: all 0.3s;
        }

        .captcha-image:hover {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .captcha-image::after {
            content: '点击刷新';
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 9px;
            color: #6b6c6f;
            letter-spacing: 0;
        }

        /* 邮箱验证码输入框 */
        .email-code-row {
            display: flex;
            gap: 12px;
        }

        .email-code-input {
            flex: 1;
        }

        .send-code-btn {
            padding: 14px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }

        .send-code-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .send-code-btn:disabled {
            background: #2b2d38;
            color: #6b6c6f;
            cursor: not-allowed;
        }

        /* 主按钮 */
        .primary-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #fe2c55 0%, #ff6b6b 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(254, 44, 85, 0.4);
        }

        /* 切换提示 */
        .switch-mode {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #2b2d38;
            font-size: 14px;
            color: #8a8b8e;
        }

        .switch-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .switch-link:hover {
            color: #8b7fff;
            text-decoration: underline;
        }

        /* 提示信息 */
        .info-message {
            margin-top: 12px;
            padding: 12px;
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 8px;
            font-size: 13px;
            color: #8a8b8e;
            line-height: 1.6;
        }

        /* 密码强度指示器 */
        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #2b2d38;
            border-radius: 2px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
            border-radius: 2px;
        }

        .password-strength-bar.weak {
            width: 33%;
            background: #ff6b6b;
        }

        .password-strength-bar.medium {
            width: 66%;
            background: #ffd93d;
        }

        .password-strength-bar.strong {
            width: 100%;
            background: #20d5a1;
        }

        .password-strength-text {
            margin-top: 4px;
            font-size: 12px;
            color: #8a8b8e;
        }

        /* 顶部导航栏示例 */
        .demo-navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: #161823;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            border-bottom: 1px solid #2b2d38;
            z-index: 1000;
        }

        .demo-logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, #4A9EFF 0%, #A78BFA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .demo-user-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .login-btn {
            padding: 8px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .user-avatar-demo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .user-avatar-demo:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .user-avatar-demo.show {
            display: flex;
        }

        .user-avatar-demo svg {
            width: 24px;
            height: 24px;
        }

        /* 滚动条样式 */
        .modal-container::-webkit-scrollbar {
            width: 8px;
        }

        .modal-container::-webkit-scrollbar-track {
            background: #161823;
        }

        .modal-container::-webkit-scrollbar-thumb {
            background: #2b2d38;
            border-radius: 4px;
        }

        .modal-container::-webkit-scrollbar-thumb:hover {
            background: #3a3a3a;
        }
    </style>
</head>
<body>
    <!-- 演示控制面板 -->
    <div class="demo-controls">
        <h3>📱 原型演示控制</h3>
        <button onclick="showLoginModal()">显示登录弹窗</button>
        <button onclick="showRegisterModal()">显示注册弹窗</button>
        <button onclick="toggleLoginState()">切换登录状态</button>
        <div class="status-indicator" id="loginStatus">
            当前状态：未登录
        </div>
    </div>

    <!-- 顶部导航栏示例 -->
    <div class="demo-navbar">
        <div class="demo-logo">FunFlow</div>
        <div class="demo-user-section">
            <button class="login-btn" id="loginButton" onclick="showLoginModal()">登录</button>
            <div class="user-avatar-demo" id="userAvatar">
                <svg viewBox="0 0 24 24" fill="white">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </div>
        </div>
    </div>

    <!-- 登录弹窗 -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal-container">
            <button class="modal-close" onclick="closeModal('loginModal')">&times;</button>
            
            <div class="modal-header">
                <h2 class="modal-title">欢迎回来</h2>
                <p class="modal-subtitle">登录 FunFlow 继续精彩内容</p>
            </div>

            <div class="modal-body">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label">邮箱</label>
                        <input type="email" class="form-input" placeholder="请输入邮箱地址" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-input" placeholder="请输入密码" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">图形验证码</label>
                        <div class="captcha-row">
                            <div class="captcha-input">
                                <input type="text" class="form-input" placeholder="请输入验证码" required>
                            </div>
                            <div class="captcha-image" onclick="refreshCaptcha(this)">
                                A3b7
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="primary-btn">登录</button>

                    <div class="switch-mode">
                        还没有账号？<a class="switch-link" onclick="switchToRegister()">立即注册</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 注册弹窗 -->
    <div class="modal-overlay" id="registerModal">
        <div class="modal-container">
            <button class="modal-close" onclick="closeModal('registerModal')">&times;</button>
            
            <div class="modal-header">
                <h2 class="modal-title">加入 FunFlow</h2>
                <p class="modal-subtitle">创建账号，开启创作之旅</p>
            </div>

            <div class="modal-body">
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label class="form-label">邮箱</label>
                        <input type="email" class="form-input" id="registerEmail" placeholder="请输入邮箱地址" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">图形验证码</label>
                        <div class="captcha-row">
                            <div class="captcha-input">
                                <input type="text" class="form-input" id="registerCaptcha" placeholder="请输入验证码" required>
                            </div>
                            <div class="captcha-image" onclick="refreshCaptcha(this)">
                                X8y9
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">邮箱验证码</label>
                        <div class="email-code-row">
                            <div class="email-code-input">
                                <input type="text" class="form-input" placeholder="请输入6位验证码" maxlength="6" required>
                            </div>
                            <button type="button" class="send-code-btn" id="sendCodeBtn" onclick="sendEmailCode()">
                                发送验证码
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">设置密码</label>
                        <input type="password" class="form-input" id="registerPassword" 
                               placeholder="8-32位，包含字母和数字" 
                               oninput="checkPasswordStrength(this.value)" required>
                        <div class="password-strength">
                            <div class="password-strength-bar" id="strengthBar"></div>
                        </div>
                        <div class="password-strength-text" id="strengthText"></div>
                    </div>

                    <button type="submit" class="primary-btn">注册</button>

                    <div class="switch-mode">
                        已有账号？<a class="switch-link" onclick="switchToLogin()">立即登录</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // 模拟登录状态
        let isLoggedIn = false;

        // 显示登录弹窗
        function showLoginModal() {
            document.getElementById('loginModal').classList.add('active');
        }

        // 显示注册弹窗
        function showRegisterModal() {
            document.getElementById('registerModal').classList.add('active');
        }

        // 关闭弹窗
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // 点击遮罩层关闭弹窗
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    closeModal(overlay.id);
                }
            });
        });

        // 切换到注册
        function switchToRegister() {
            closeModal('loginModal');
            setTimeout(() => showRegisterModal(), 300);
        }

        // 切换到登录
        function switchToLogin() {
            closeModal('registerModal');
            setTimeout(() => showLoginModal(), 300);
        }

        // 刷新图形验证码
        function refreshCaptcha(element) {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for (let i = 0; i < 4; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            element.textContent = code;
            
            // 添加刷新动画
            element.style.transform = 'scale(0.9)';
            setTimeout(() => {
                element.style.transform = 'scale(1)';
            }, 100);
        }

        // 发送邮箱验证码
        let countdown = 0;
        function sendEmailCode() {
            const email = document.getElementById('registerEmail').value;
            const captcha = document.getElementById('registerCaptcha').value;
            const btn = document.getElementById('sendCodeBtn');
            
            if (!email) {
                alert('请先输入邮箱地址');
                return;
            }
            
            if (!captcha) {
                alert('请先输入图形验证码');
                return;
            }
            
            // 模拟发送
            alert('✅ 验证码已发送到您的邮箱！\n\n（这是原型演示，实际会调用接口：POST /api/auth/send-email-code）');
            
            // 开始倒计时
            countdown = 60;
            btn.disabled = true;
            
            const timer = setInterval(() => {
                countdown--;
                btn.textContent = `${countdown}秒后重试`;
                
                if (countdown <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.textContent = '发送验证码';
                }
            }, 1000);
        }

        // 检查密码强度
        function checkPasswordStrength(password) {
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');
            
            if (password.length === 0) {
                bar.className = 'password-strength-bar';
                text.textContent = '';
                return;
            }
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/)) strength++;
            if (password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;
            
            bar.className = 'password-strength-bar';
            
            if (strength <= 2) {
                bar.classList.add('weak');
                text.textContent = '密码强度：弱';
                text.style.color = '#ff6b6b';
            } else if (strength <= 3) {
                bar.classList.add('medium');
                text.textContent = '密码强度：中等';
                text.style.color = '#ffd93d';
            } else {
                bar.classList.add('strong');
                text.textContent = '密码强度：强';
                text.style.color = '#20d5a1';
            }
        }

        // 处理登录
        function handleLogin(event) {
            event.preventDefault();
            alert('✅ 登录成功！\n\n（这是原型演示，实际会调用接口：POST /api/auth/login）');
            closeModal('loginModal');
            setLoginState(true);
        }

        // 处理注册
        function handleRegister(event) {
            event.preventDefault();
            alert('✅ 注册成功！\n\n（这是原型演示，实际会调用接口：POST /api/auth/register）');
            closeModal('registerModal');
            setTimeout(() => showLoginModal(), 500);
        }

        // 切换登录状态（演示用）
        function toggleLoginState() {
            setLoginState(!isLoggedIn);
        }

        // 设置登录状态
        function setLoginState(loggedIn) {
            isLoggedIn = loggedIn;
            const loginBtn = document.getElementById('loginButton');
            const avatar = document.getElementById('userAvatar');
            const statusText = document.getElementById('loginStatus');
            
            if (isLoggedIn) {
                loginBtn.style.display = 'none';
                avatar.classList.add('show');
                statusText.textContent = '当前状态：已登录';
                statusText.classList.add('logged-in');
            } else {
                loginBtn.style.display = 'block';
                avatar.classList.remove('show');
                statusText.textContent = '当前状态：未登录';
                statusText.classList.remove('logged-in');
            }
        }

        // 页面加载时初始化验证码
        window.addEventListener('load', () => {
            document.querySelectorAll('.captcha-image').forEach(element => {
                refreshCaptcha(element);
            });
        });
    </script>
</body>
</html>
